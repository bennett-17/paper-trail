name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Fuzz smoke test
        # Short, fixed-duration runs, not exhaustive fuzzing -- just
        # enough to catch an obvious regression in the text-
        # normalization functions that process real, messy live-API
        # data (entity names/addresses aren't input this program
        # controls).
        run: |
          go test ./internal/risk/... -run=^$ -fuzz=FuzzFoldDiacritics -fuzztime=5s
          go test ./internal/risk/... -run=^$ -fuzz=FuzzNormalizeText -fuzztime=5s
          go test ./internal/risk/... -run=^$ -fuzz=FuzzTokenizeName -fuzztime=5s
          go test ./internal/risk/... -run=^$ -fuzz=FuzzNormalizeAddressFuzzy -fuzztime=5s
